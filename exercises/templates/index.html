<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Gym | Cyber-Selection</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; z-index: -1; }
        
        .content { position: relative; z-index: 1; padding: 50px; text-align: center; }
        h1 { font-size: 4rem; text-transform: uppercase; letter-spacing: 10px; margin-bottom: 50px;
             background: linear-gradient(to right, #00ff88, #bc00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; max-width: 1200px; margin: auto; }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 50px 20px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            text-decoration: none; color: white;
            transition: 0.4s ease;
            text-transform: uppercase; font-weight: bold;
        }
        .card:hover { 
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            transform: scale(1.05) translateZ(20px);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="content">
       
        <div class="grid">
            {% for ex in exercises %}
            <a href="/workout/{{ ex }}" class="card">{{ ex }}</a>
            {% endfor %}
        </div>
    </div>

    <script>
        // Three.js Background Logic
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Create Neon Grid
        const grid = new THREE.GridHelper(100, 40, 0x00ff88, 0x333333);
        grid.position.y = -5;
        scene.add(grid);

        camera.position.z = 15;
        camera.position.y = 2;

        function animate() {
            requestAnimationFrame(animate);
            grid.position.z += 0.05;
            if (grid.position.z > 2.5) grid.position.z = 0;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
